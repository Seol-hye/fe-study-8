<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <!--
            의미를 내포하면서 강조하기
            *페이지 의미 분석
            *웹 접근성
        -->
        <p>이 시설은 <strong>관계자 외 출입금지</strong>입니다.</p>
        <p>이곳은 위험하오니 <em>절대로</em> 지나가지 마십시오.</p>
        <br>

        <!-- 시각적으로 강조하기 -->
        <p>이 시설은 <b>관계자 외 출입금지</b>입니다.</p>
        <p>이곳은 위험하오니 <i>절대로</i> 지나가지 마십시오.</p>


    </body>
</html>
