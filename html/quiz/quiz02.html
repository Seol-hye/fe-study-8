<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>연습문제 3번</title>
    </head>
    <body>
        <form>
            <label for="name">고객명:</label>
            <input type="text" id="name"><br><br>
            <label for="tel">전화번호:</label>
            <input type="tel"><br><br>
            <label for="email">이메일:</label>
            <input type="email"><br>
            
            <p>
                <label for="selectCf">피자선택:</label>
                <select id="selectCf">
                    <option value="1">피자를 선택하세요</option>
                    <option value="2">치즈</option>
                    <option value="3">페페로니</option>
                    <option value="4">콤비네이션</option>
                </select>
            </p>

            <fieldset>
                <legend>피자 사이즈</legend>
                <label><input type="radio" name="size">Small</label><br><br>
                <label><input type="radio" name="size">Medium</label><br><br>
                <label><input type="radio" name="size">Large</label><br><br>
            </fieldset>
            <fieldset>
                <legend>토핑 선택</legend>
                    <label><input type="checkbox">베이컨</label><br><br>
                    <label><input type="checkbox">치즈</label><br><br>
                    <label><input type="checkbox">양파</label><br><br>
                    <label><input type="checkbox">버섯</label><br><br>
            </fieldset>
            <br>
            희망배송시간: <input type="time"><br>
            배송 시 요청사항: <textarea></textarea>
        
            <button type="submit">주문하기</button>
        </form>
        
    </body>
</html>
